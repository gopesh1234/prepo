<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Match the Columns</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .column {
            width: 200px;
            margin: 0 40px;
        }

        .item {
            padding: 10px;
            margin: 10px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

            .item:hover {
                background: #e3f2fd;
            }

        .selected {
            background: #90caf9 !important;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .controls {
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #1976d2;
            color: white;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Match the Columns</h2>
    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="column" id="left"></div>
        <div class="column" id="right"></div>
    </div>

    <div class="controls">
        <button onclick="prevQ()">◀ Back</button>
        <button onclick="checkAnswer()">OK</button>
        <button onclick="nextQ()">Next ▶</button>
        <button onclick="clearStorage()">Clear Storage</button>
    </div>

    <div class="result" id="result"></div>

    <script>
        let questions = [
            {
                left: [
                    "A Backseat Driver",
                    "A Baker's Dozen",
                    "A Bad Patch",
                    "A Bear Garden",
                    "A Ball of Fire"
                ],
                right: [
                    "A group of 13",
                    "A place of noise and disturbance",
                    "Someone who gives unnecessary advice",
                    "An active and energetic person",
                    "A period of trouble"
                ],
                answer: {
                    0: 2,
                    1: 0,
                    2: 4,
                    3: 1,
                    4: 3
                }
            },
            {
                left: [
                    "Absolution",
                    "Ablution",
                    "Abolish",
                    "Abdicate",
                    "Aberration"
                ],
                right: [
                    "Deviation from the right course",
                    "The act of washing oneself",
                    "Act of giving up the throne",
                    "Formal forgiveness for wrongdoing",
                    "To officially end or stop something"
                ],
                answer: {
                    0: 3,
                    1: 1,
                    2: 4,
                    3: 2,
                    4: 0
                }
            },
        ];

        let current = 0;
        let selectedLeft = null;
        let matches = {};

        const leftDiv = document.getElementById("left");
        const rightDiv = document.getElementById("right");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resizeCanvas;
        resizeCanvas();

        function loadQ() {
            leftDiv.innerHTML = "";
            rightDiv.innerHTML = "";
            matches = JSON.parse(localStorage.getItem("matches_" + current)) || {};

            questions[current].left.forEach((text, i) => {
                let div = document.createElement("div");
                div.className = "item";
                div.innerText = text;
                div.onclick = () => selectLeft(i, div);
                leftDiv.appendChild(div);
            });

            questions[current].right.forEach((text, i) => {
                let div = document.createElement("div");
                div.className = "item";
                div.innerText = text;
                div.onclick = () => selectRight(i);
                rightDiv.appendChild(div);
            });

            drawLines();
        }

        function selectLeft(index, el) {
            selectedLeft = index;
            document.querySelectorAll(".left .item");
            document.querySelectorAll(".item").forEach(e => e.classList.remove("selected"));
            el.classList.add("selected");
        }

        function selectRight(index) {
            if (selectedLeft !== null) {
                matches[selectedLeft] = index;
                localStorage.setItem("matches_" + current, JSON.stringify(matches));
                selectedLeft = null;
                drawLines();
            }
        }

        function drawLines() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let leftItems = leftDiv.children;
            let rightItems = rightDiv.children;

            Object.keys(matches).forEach(l => {
                let r = matches[l];

                let lRect = leftItems[l].getBoundingClientRect();
                let rRect = rightItems[r].getBoundingClientRect();

                ctx.beginPath();
                ctx.moveTo(lRect.right, lRect.top + lRect.height / 2);
                ctx.lineTo(rRect.left, rRect.top + rRect.height / 2);
                ctx.strokeStyle = "#1976d2";
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        function checkAnswer() {
            let correct = 0;
            let ans = questions[current].answer;
            Object.keys(ans).forEach(k => {
                if (matches[k] == ans[k]) correct++;
            });

            document.getElementById("result").innerText =
                `Correct: ${correct} / ${Object.keys(ans).length}`;
        }

        function nextQ() {
            if (current < questions.length - 1) {
                current++;
                loadQ();
            }
        }

        function prevQ() {
            if (current > 0) {
                current--;
                loadQ();
            }
        }

        function clearStorage() {
            localStorage.clear();
            alert("Storage cleared");
        }

        loadQ();
    </script>

</body>
</html>
