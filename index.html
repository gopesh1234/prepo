<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOCAB</title>
    <style>
            body {
                font-family: Arial;
                margin: 0;
                background: #f2f2f2;
                padding-bottom: 70px
            }

            .header {
                background: #1976d2;
                color: #fff;
                text-align: center;
                padding: 12px;
                font-weight: bold;
                position: sticky;
                top: 0
            }

            .topbar {
                display: flex;
                gap: 8px;
                padding: 10px;
                background: #fff;
                position: sticky;
                top: 44px;
                z-index: 2;
                flex-wrap: wrap
            }

            select, .smallbtn, input {
                padding: 8px;
                border: none;
                border-radius: 8px;
                background: #e3f2fd
            }

            .question-box {
                padding: 15px
            }

            .columns {
                display: flex;
                justify-content: space-between;
                gap: 10px
            }

            .column {
                width: 48%
            }

            .item {
                background: #fff;
                padding: 10px;
                margin: 10px 0;
                border-radius: 8px;
                box-shadow: 0 2px 4px rgba(0,0,0,.2);
                cursor: pointer
            }

                .item.selected {
                    outline: 2px solid #1976d2
                }

            .controls {
                position: fixed;
                bottom: 0;
                width: 100%;
                display: flex
            }

                .controls button {
                    flex: 1;
                    padding: 15px;
                    border: none;
                    font-size: 16px
                }

            .prev {
                background: #bdbdbd
            }

            .ok {
                background: #1976d2;
                color: #fff
            }

            .next {
                background: #4caf50;
                color: #fff
            }

            .answerBox {
                padding: 10px 15px;
                color: #333;
                font-size: 14px
            }

            #visitedStatus {
                padding: 5px 15px;
                font-weight: bold;
                color: #43a047
            }
    </style>
</head>
<body>

    <div class='header'>
        VOCAB
                <span id='pageCount' style='float:right;font-size:14px;margin-right:10px'></span>
            <span id="attemptedCount" style="display:block;font-size:13px;margin-top:4px"></span>
    </div>

    <div class='topbar'>

        <select id='difficulty' onchange='saveDifficulty()'>
            <option value='hard'>Hard</option>
        </select>

        <select id='filter' onchange='applyFilter()'>
            <option value='all'>All Pages</option>
            <option value='hard'>Hard</option>
            <option value='hidden'>Easy Section</option>
        </select>

        <input type="number" id="jumpPage" placeholder="Page" style="width:70px">

        <button class='smallbtn' onclick='goToPage()'>Go</button>

        <button class='smallbtn' onclick='showAnswers()'>💡</button>

        <button class='smallbtn' onclick='clearStorage()'>🗑</button>

        <button class='smallbtn' onclick='searchWord()'>🔍</button>

        <button class='smallbtn' onclick='togglePageVisibility()'>👁</button>

    </div>

    <div id="visitedStatus"></div>

    <div class='answerBox' id='answerBox'></div>

    <div class='question-box'>
        <div class='columns'>
            <div class='column' id='left'></div>
            <div class='column' id='right'></div>
        </div>
    </div>

    <div class='controls'>
        <button class='prev' onclick='prevQ()'>Prev</button>
        <button class='ok' onclick='checkAnswer()'>OK</button>
        <button class='next' onclick='nextQ()'>Next</button>
    </div>

    <script>
        function getAttemptedPages() {
    return new Set(JSON.parse(localStorage.getItem("attemptedPages") || "[]"));
}

function markPageAttempted() {

    let attemptedPages =
        JSON.parse(localStorage.getItem("attemptedPages") || "[]");

    let pageNo = current + 1;

    if (!attemptedPages.includes(pageNo)) {
        attemptedPages.push(pageNo);

        localStorage.setItem(
            "attemptedPages",
            JSON.stringify(attemptedPages)
        );
    }

    updateAttemptedCounter();
}

function updateAttemptedCounter() {
    let attempted = getAttemptedPages();

    document.getElementById("attemptedCount").innerText =
        `Attempted: ${attempted.size} / ${questions.length}`;

            let current = 0,
                selectedLeft = null,
                matches = {},
                hiddenPages = JSON.parse(localStorage.getItem('hiddenPages') || '[]'),
                filtered = questions
                    .map((_, i) => i)
                    .filter(i => !hiddenPages.includes(i));

            let rowStatus = JSON.parse(localStorage.getItem('rowStatus') || '{}');

            let visitedPages = JSON.parse(localStorage.getItem('visitedPages') || '[]');

            const leftDiv = document.getElementById('left'),
                rightDiv = document.getElementById('right');

            function getRepeatCount(word) {

                let count = 0;

                questions.forEach(q => {

                    q.left.forEach(w => {

                        if (w === word) count++;
                    });
                });

                return count;
            }

            function formatLeftWord(word) {

                let count = getRepeatCount(word);

                return count > 1
                    ? word + '(#R' + count + ')'
                    : word;
            }

            function loadQ() {

                if (filtered.length === 0) {

                    leftDiv.innerHTML = '';
                    rightDiv.innerHTML = '';

                    document.getElementById('answerBox').innerHTML =
                        'No pages available';

                    document.getElementById('pageCount').innerText =
                        '0/0';

                    document.getElementById('visitedStatus').innerHTML =
                        '';

                    return;
                }

                document.getElementById('pageCount').innerText =
                    (current + 1) + '/' + filtered.length;

                let currentRef = filtered[current];

                // SHOW VISITED STATUS

                if (visitedPages.includes(currentRef)) {

                    document.getElementById('visitedStatus').innerHTML =
                        '✅ Attempted';

                } else {

                    document.getElementById('visitedStatus').innerHTML =
                        '';
                }

                let ref = filtered[current];

                if (ref == null) return;

                leftDiv.innerHTML = '';
                rightDiv.innerHTML = '';

                matches = {};

                selectedLeft = null;

                document.getElementById('answerBox').innerHTML = '';

                // HARD SECTION

                if (ref === 'hard_all') {

                    leftDiv.style.width = '100%';

                    rightDiv.style.display = 'none';

                    document.body.style.paddingBottom = '0px';

                    document.body.style.overflowX = 'hidden';

                    let count = 0;

                    for (let p = 0; p < questions.length; p++) {

                        for (let r = 0; r < questions[p].left.length; r++) {

                            if (rowStatus[p + '_' + r] === 'hard') {

                                count++;

                                let box = document.createElement('div');

                                box.className = 'item';

                                box.style.width = '100%';

                                box.style.margin = '10px 0';

                                box.style.lineHeight = '1.5';

                                box.style.boxSizing = 'border-box';

                                box.style.wordBreak = 'break-word';

                                box.innerHTML =
                                    "<b>" +
                                    questions[p].left[r] +
                                    ":</b> " +
                                    questions[p].right[
                                    questions[p].answer[r]
                                    ];

                                leftDiv.appendChild(box);
                            }
                        }
                    }

                    document.getElementById('pageCount').innerText =
                        '1/1';

                    if (count === 0) {

                        document.getElementById('answerBox').innerHTML =
                            'No hard rows found';
                    }

                    return;
                }

                // NORMAL SECTION

                document.body.style.paddingBottom = '70px';

                document.body.style.overflowX = 'hidden';

                leftDiv.style.width = '48%';

                rightDiv.style.width = '48%';

                rightDiv.style.display = 'block';

                let rowOnly = false;

                let real = ref;

                if (String(ref).includes('_')) {

                    let parts = String(ref).split('_');

                    real = parseInt(parts[0]);

                    selectedLeft = parseInt(parts[1]);

                    rowOnly = true;
                }

                document.getElementById('difficulty').value = '';

                questions[real].left.forEach((t, i) => {

                    if (rowOnly && i !== selectedLeft) return;

                    let d = document.createElement('div');

                    d.className = 'item';

                    d.innerText = formatLeftWord(t);

                    let st = rowStatus[real + '_' + i];

                    if (st) {

                        d.style.border =
                            '2px solid ' +
                            (st === 'hard'
                                ? '#e53935'
                                : '#43a047');
                    }

                    d.onclick = () => selectLeft(i, d);

                    leftDiv.appendChild(d);
                });

                questions[real].right.forEach((t, i) => {

                    if (rowOnly) {

                        let ans =
                            questions[real].answer[selectedLeft];

                        if (i !== ans) return;
                    }

                    let d = document.createElement('div');

                    d.className = 'item';

                    d.innerText = t;

                    d.onclick = () => selectRight(i);

                    rightDiv.appendChild(d);
                });
            }

            function goToPage() {

                let p =
                    parseInt(
                        document.getElementById('jumpPage').value
                    );

                if (
                    isNaN(p) ||
                    p < 1 ||
                    p > filtered.length
                ) {

                    alert('Invalid page number');

                    return;
                }

                current = p - 1;

                loadQ();
            }

            function nextQ() {

                if (filtered.length === 0) return;

                current =
                    (current + 1) % filtered.length;

                loadQ();
            }

            function prevQ() {

                if (filtered.length === 0) return;

                current =
                    (current - 1 + filtered.length) %
                    filtered.length;

                loadQ();
            }

            function searchWord() {

                let s = prompt('Enter word to search');

                if (!s) return;

                s = s.toLowerCase().trim();

                filtered = [];

                questions.forEach((q, pi) => {

                    if (
                        document.getElementById('filter').value !== 'hidden' &&
                        hiddenPages.includes(pi)
                    ) return;

                    let found =
                        q.left.some(x =>
                            x.toLowerCase().includes(s)
                        ) ||
                        q.right.some(x =>
                            x.toLowerCase().includes(s)
                        );

                    if (found) filtered.push(pi);
                });

                if (filtered.length === 0) {

                    alert('No page found');

                    applyFilter();

                    return;
                }

                current = 0;

                loadQ();
            }

            function selectLeft(i, el) {

                if (matches.hasOwnProperty(i)) return;

                selectedLeft = i;

                document
                    .querySelectorAll('.item')
                    .forEach(e =>
                        e.classList.remove('selected')
                    );

                el.classList.add('selected');

                let real = filtered[current];

                document.getElementById('difficulty').value =
                    rowStatus[real + '_' + i] || '';
            }

            function selectRight(i) {

                if (selectedLeft !== null) {

                    if (
                        Object.values(matches).includes(i)
                    ) return;

                    matches[selectedLeft] = i;

                    let c = getColor(
                        Object.keys(matches).length
                    );

                    leftDiv.children[selectedLeft]
                        .style.background = c;

                    rightDiv.children[i]
                        .style.background = c;

                    leftDiv.children[selectedLeft]
                        .style.pointerEvents = 'none';

                    rightDiv.children[i]
                        .style.pointerEvents = 'none';

                    selectedLeft = null;
                }
            }

            function getColor(i) {

                const colors = [
                    '#ffccbc',
                    '#c5e1a5',
                    '#b3e5fc',
                    '#f8bbd0',
                    '#d1c4e9'
                ];

                return colors[(i - 1) % colors.length];
            }

            function checkAnswer() {

                let currentRef = filtered[current];

                let ans =
                    questions[currentRef].answer;

                let correct = 0;

                Object.keys(ans).forEach(k => {

                    if (matches[k] == ans[k]) {

                        correct++;
                    }
                });

                visitedPages.push(currentRef);

                localStorage.setItem(
                    'visitedPages',
                    JSON.stringify(visitedPages)
                );

                if (visitedPages.includes(currentRef)) {

                    document.getElementById('visitedStatus').innerHTML =
                        '✅ Attempted';

                }

                alert(
                    'Correct: ' +
                    correct +
                    '/' +
                    Object.keys(ans).length
                );
                markPageAttempted();
            }

            function showAnswers() {

                let q =
                    questions[filtered[current]];

                let txt = '';

                Object.keys(q.answer).forEach(k => {

                    txt +=
                        (parseInt(k) + 1) +
                        '. ' +
                        q.left[k] +
                        ' ➜ ' +
                        q.right[q.answer[k]] +
                        '<br>';
                });

                document.getElementById('answerBox').innerHTML =
                    txt;
            }

            function saveDifficulty() {

                if (selectedLeft === null) return;

                let real = filtered[current];

                let val =
                    document.getElementById('difficulty').value;

                let key =
                    real + '_' + selectedLeft;

                rowStatus[key] = val;

                localStorage.setItem(
                    'rowStatus',
                    JSON.stringify(rowStatus)
                );

                let row =
                    leftDiv.children[selectedLeft];

                if (row) {

                    row.style.border =
                        '2px solid ' +
                        (val === 'hard'
                            ? '#e53935'
                            : '#43a047');
                }
            }

            function applyFilter() {

                let f =
                    document.getElementById('filter').value;

                filtered = [];

                if (f === 'all') {

                    filtered = questions
                        .map((_, i) => i)
                        .filter(i =>
                            !hiddenPages.includes(i)
                        );

                } else if (f === 'hidden') {

                    filtered = [...hiddenPages];

                } else {

                    filtered = ['hard_all'];
                }

                if (filtered.length === 0) {

                    alert('No pages found');

                    filtered = questions
                        .map((_, i) => i)
                        .filter(i =>
                            !hiddenPages.includes(i)
                        );

                    document.getElementById('filter').value =
                        'all';
                }

                current = 0;

                loadQ();
            }

            function togglePageVisibility() {

                let ref = filtered[current];

                let real = ref;

                if (hiddenPages.includes(real)) {

                    hiddenPages =
                        hiddenPages.filter(
                            x => x !== real
                        );

                    alert('Page shown');

                } else {

                    hiddenPages.push(real);

                    alert('Page hidden');
                }

                localStorage.setItem(
                    'hiddenPages',
                    JSON.stringify(hiddenPages)
                );

                applyFilter();
            }

            function clearStorage() {

                if (
                    confirm('Clear all saved data?')
                ) {

                    localStorage.clear();

                    rowStatus = {};

                    hiddenPages = [];

                    visitedPages = [];

                    filtered =
                        questions.map((_, i) => i);

                    current = 0;

                    document.getElementById('filter').value =
                        'all';

                    loadQ();
                }
            }

            loadQ();
            updateAttemptedCounter();
