@{
    Layout = null;
}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Match the Columns</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            color: #333;
            text-align: center;
        }

        h2 {
            color: white;
            margin-top: 15px;
        }

        .container {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            gap: 10px;
        }

        .column {
            width: 45%;
        }

        .item {
            padding: 14px;
            margin: 10px 0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            font-size: 14px;
        }

        .item:hover {
            transform: scale(1.03);
            background: #e3f2fd;
        }

        .selected {
            background: #4caf50 !important;
            color: white;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .controls {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 10px;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.2);
        }

        button {
            padding: 12px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #1976d2;
            color: white;
            font-size: 14px;
            width: 22%;
        }

        .result {
            margin: 10px;
            font-weight: bold;
            color: white;
        }

        @@media (max-width: 768px) {
            .column {
                width: 48%;
            }

            button {
                width: 23%;
                font-size: 12px;
                padding: 10px;
            }

            .item {
                font-size: 13px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <h2>Match the Columns</h2>
    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="column" id="left"></div>
        <div class="column" id="right"></div>
    </div>

    <div class="controls">
        <button onclick="prevQ()">◀</button>
        <button onclick="checkAnswer()">OK</button>
        <button onclick="nextQ()">▶</button>
        <button onclick="clearStorage()">Clear</button>
    </div>

    <div class="result" id="result"></div>

    <script>
        let questions = [
            {
                left: [
                    "A Backseat Driver",
                    "A Baker's Dozen",
                    "A Bad Patch",
                    "A Bear Garden",
                    "A Ball of Fire"
                ],
                right: [
                    "A group of 13",
                    "A place of noise and disturbance",
                    "Someone who gives unnecessary advice",
                    "An active and energetic person",
                    "A period of trouble"
                ],
                answer: {
                    0: 2,
                    1: 0,
                    2: 4,
                    3: 1,
                    4: 3
                }
            },
            {
                left: [
                    "Absolution",
                    "Ablution",
                    "Abolish",
                    "Abdicate",
                    "Aberration"
                ],
                right: [
                    "Deviation from the right course",
                    "The act of washing oneself",
                    "Act of giving up the throne",
                    "Formal forgiveness for wrongdoing",
                    "To officially end or stop something"
                ],
                answer: {
                    0: 3,
                    1: 1,
                    2: 4,
                    3: 2,
                    4: 0
                }
            }
        ];

        let current = 0;
        let selectedLeft = null;
        let matches = {};

        const leftDiv = document.getElementById("left");
        const rightDiv = document.getElementById("right");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resizeCanvas;
        resizeCanvas();

        function loadQ() {
            leftDiv.innerHTML = "";
            rightDiv.innerHTML = "";

            // ✅ restore saved matches
            matches = JSON.parse(localStorage.getItem("matches_" + current)) || {};

            // ❌ clear only result
            document.getElementById("result").innerText = "";

            questions[current].left.forEach((text, i) => {
                let div = document.createElement("div");
                div.className = "item";
                div.innerText = text;
                div.onclick = () => selectLeft(i, div);
                leftDiv.appendChild(div);
            });

            questions[current].right.forEach((text, i) => {
                let div = document.createElement("div");
                div.className = "item";
                div.innerText = text;
                div.onclick = () => selectRight(i);
                rightDiv.appendChild(div);
            });

            drawLines();
        }

        function selectLeft(index, el) {
            selectedLeft = index;

            document.querySelectorAll(".item").forEach(e => e.classList.remove("selected"));
            el.classList.add("selected");
        }

        function selectRight(index) {
            if (selectedLeft !== null) {
                matches[selectedLeft] = index;

                // ✅ save progress
                localStorage.setItem("matches_" + current, JSON.stringify(matches));

                selectedLeft = null;
                drawLines();
            }
        }

        function drawLines() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let leftItems = leftDiv.children;
            let rightItems = rightDiv.children;

            Object.keys(matches).forEach(l => {
                let r = matches[l];

                let lRect = leftItems[l].getBoundingClientRect();
                let rRect = rightItems[r].getBoundingClientRect();

                ctx.beginPath();
                ctx.moveTo(lRect.right, lRect.top + lRect.height / 2);
                ctx.lineTo(rRect.left, rRect.top + rRect.height / 2);
                ctx.strokeStyle = "#ffeb3b";
                ctx.lineWidth = 3;
                ctx.stroke();
            });
        }

        function checkAnswer() {
            let correct = 0;
            let ans = questions[current].answer;

            Object.keys(ans).forEach(k => {
                if (matches[k] == ans[k]) correct++;
            });

            document.getElementById("result").innerText =
                `Correct: ${correct} / ${Object.keys(ans).length}`;
        }

        function nextQ() {
            if (current < questions.length - 1) {
                current++;
                loadQ();
            }
        }

        function prevQ() {
            if (current > 0) {
                current--;
                loadQ();
            }
        }

        function clearStorage() {
            localStorage.clear();
            matches = {};
            loadQ();
            alert("Storage cleared");
        }

        // initial load
        loadQ();
    </script>

</body>
</html>
