        let pageStatus = JSON.parse(localStorage.getItem('pageStatus') || '{}');
        const leftDiv = document.getElementById('left'), rightDiv = document.getElementById('right');
        function loadQ() { document.getElementById('pageCount').innerText = (current + 1) + '/' + filtered.length; let real = filtered[current]; if (real == null) return; leftDiv.innerHTML = ''; rightDiv.innerHTML = ''; matches = {}; document.getElementById('answerBox').innerHTML = ''; document.getElementById('difficulty').value = pageStatus[real] || 'easy'; questions[real].left.forEach((t, i) => { let d = document.createElement('div'); d.className = 'item'; d.innerText = t; d.onclick = () => selectLeft(i, d); leftDiv.appendChild(d) }); questions[real].right.forEach((t, i) => { let d = document.createElement('div'); d.className = 'item'; d.innerText = t; d.onclick = () => selectRight(i); rightDiv.appendChild(d) }); }
        function selectLeft(i, el) { if (matches.hasOwnProperty(i)) return; selectedLeft = i; document.querySelectorAll('.item').forEach(e => e.classList.remove('selected')); el.classList.add('selected'); }
        function selectRight(i) { if (selectedLeft !== null) { if (Object.values(matches).includes(i)) return; matches[selectedLeft] = i; let c = getColor(Object.keys(matches).length); leftDiv.children[selectedLeft].style.background = c; rightDiv.children[i].style.background = c; leftDiv.children[selectedLeft].style.pointerEvents = 'none'; rightDiv.children[i].style.pointerEvents = 'none'; selectedLeft = null; } }
        function getColor(i) { const colors = ['#ffccbc', '#c5e1a5', '#b3e5fc', '#f8bbd0', '#d1c4e9']; return colors[(i - 1) % colors.length] }
        function checkAnswer() { let ans = questions[filtered[current]].answer, correct = 0; Object.keys(ans).forEach(k => { if (matches[k] == ans[k]) correct++ }); alert('Correct: ' + correct + '/' + Object.keys(ans).length) }
        function showAnswers() { let q = questions[filtered[current]], txt = ''; Object.keys(q.answer).forEach(k => { txt += (parseInt(k) + 1) + '. ' + q.left[k] + ' ➜ ' + q.right[q.answer[k]] + '<br>' }); document.getElementById('answerBox').innerHTML = txt; }
        function saveDifficulty() { pageStatus[filtered[current]] = document.getElementById('difficulty').value; localStorage.setItem('pageStatus', JSON.stringify(pageStatus)); }
        function applyFilter() { let f = document.getElementById('filter').value; filtered = []; for (let i = 0; i < questions.length; i++) { let s = pageStatus[i] || 'easy'; if (f === 'all' || f === s) filtered.push(i); } current = 0; if (filtered.length === 0) { leftDiv.innerHTML = ''; rightDiv.innerHTML = ''; document.getElementById('answerBox').innerHTML = 'No pages found'; return; } loadQ(); }
        function nextQ() { if (current < filtered.length - 1) { current++; loadQ(); } }
        function prevQ() { if (current > 0) { current--; loadQ(); } }
        loadQ();
    </script>
</body>
</html>
