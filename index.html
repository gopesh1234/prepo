        let current = 0;

        const leftDiv = document.getElementById("left");
        const rightDiv = document.getElementById("right");

        function loadQ() {
            leftDiv.innerHTML = "";
            rightDiv.innerHTML = "";
            matches = {};

            questions[current].left.forEach((text, i) => {
                let div = document.createElement("div");
                div.className = "item";
                div.innerText = text;
                div.onclick = () => selectLeft(i, div);
                leftDiv.appendChild(div);
            });

            questions[current].right.forEach((text, i) => {
                let div = document.createElement("div");
                div.className = "item";
                div.innerText = text;
                div.onclick = () => selectRight(i);
                rightDiv.appendChild(div);
            });
        }

        function selectLeft(index, el) {
            // prevent selecting already matched (locked) left item
            if (matches.hasOwnProperty(index)) return;

            selectedLeft = index;
            document.querySelectorAll('.item').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
        }

        function selectRight(index) {
            if (selectedLeft !== null) {
                // prevent selecting a right item that's already used (locked)
                if (Object.values(matches).includes(index)) return;

                matches[selectedLeft] = index;

                let leftItems = leftDiv.children;
                let rightItems = rightDiv.children;

                // unique color per pair
                let color = getColor(Object.keys(matches).length);

                leftItems[selectedLeft].style.background = color;
                rightItems[index].style.background = color;

                // lock visual (no further clicks effect)
                leftItems[selectedLeft].style.pointerEvents = 'none';
                rightItems[index].style.pointerEvents = 'none';

                selectedLeft = null;
            }
        }

        // predefined soft colors
        function getColor(i) {
            const colors = [
                "#ffccbc", // orange
                "#c5e1a5", // green
                "#b3e5fc", // blue
                "#f8bbd0", // pink
                "#d1c4e9", // purple
                "#ffe082"  // yellow
            ];
            return colors[(i - 1) % colors.length];
        }


        function checkAnswer() {
            let ans = questions[current].answer;
            let correct = 0;
            Object.keys(ans).forEach(k => {
                if (matches[k] == ans[k]) correct++;
            });
            alert("Correct: " + correct + "/" + Object.keys(ans).length);
        }

        function nextQ() {
            if (current < questions.length - 1) {
                current++;
                loadQ();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
        function prevQ() {
            if (current > 0) {
                current--;
                loadQ();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
